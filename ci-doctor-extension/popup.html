<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CI Doctor — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 20px;
      width: 320px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #21262d;
    }
    .logo { font-size: 20px; font-weight: 700; color: #58a6ff; }
    .title { font-size: 14px; font-weight: 600; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      font-family: monospace;
    }
    input:focus { border-color: #58a6ff; }
    .hint {
      font-size: 11px;
      color: #8b949e;
      margin-top: 6px;
      line-height: 1.5;
    }
    .hint a { color: #58a6ff; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }
    .row { display: flex; gap: 8px; margin-top: 14px; }
    button {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .btn-secondary:hover { background: #30363d; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
    }
    .status-ok { color: #3fb950; }
    .status-err { color: #f85149; }
    .scopes {
      margin-top: 16px;
      padding: 10px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 11px;
      color: #8b949e;
    }
    .scopes strong { color: #e6edf3; }
    .scope-tag {
      display: inline-block;
      background: #1f6feb33;
      color: #58a6ff;
      border: 1px solid #1f6feb66;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 11px;
      margin: 2px 2px 0 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">+</span>
    <span class="title">CI Doctor Settings</span>
  </div>

  <label>GitHub Personal Access Token</label>
  <input type="password" id="pat" placeholder="ghp_..." autocomplete="off" spellcheck="false">
  <p class="hint">
    Required to apply fixes directly without leaving GitHub.<br>
    <a id="token-link" href="#" target="_blank">Generate token →</a>
  </p>

  <div class="scopes">
    <strong>Required scopes:</strong><br>
    <span class="scope-tag">repo</span>
    <span class="scope-tag">workflow</span>
    <span style="font-size:11px; color:#8b949e;">(workflow needed to edit .github/workflows files)</span>
  </div>

  <div class="row">
    <button class="btn-primary" id="save">Save</button>
    <button class="btn-secondary" id="clear">Clear</button>
  </div>
  <p id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
